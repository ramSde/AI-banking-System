# ══════════════════════════════════════════════════════════════════════
# API Gateway — application-dev.yml
# Development environment configuration
# Used for local development with Docker Compose
# ══════════════════════════════════════════════════════════════════════

spring:
  profiles:
    active: dev

# ── DEVELOPMENT SERVER SETTINGS ──────────────────────────────────────
server:
  port: 8080

management:
  server:
    port: 8081
  endpoint:
    health:
      show-details: always  # Show full health details in dev

# ── DEVELOPMENT REDIS SETTINGS ───────────────────────────────────────
spring:
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      database: 0

# ── DEVELOPMENT BANKING PROPERTIES ───────────────────────────────────
banking:
  gateway:
    jwt:
      # Development RSA public key (DO NOT USE IN PRODUCTION)
      # This is a sample key for local development only
      public-key: |
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA4f5wg5l2hKsTeNem/V41
        fGnJm6gOdrj8ym3rFkEjWT2btf06kkstX2LvAjYdgGnI8Ej2BpmfciHlMa8sc4VQ
        kOKvjgdHBmGHqmM5dcgKxYWtLVHZ6z/LKnZyuGBrBBYklJGdO6z1xWxJw4ej2UcN
        lXxyFn6vNjvQoaq30cINhw4f2VdF9yxqHcauHOobwuIM3fRZ6s/iiPPFRTAcrbBY
        uqBInrT3A/sczRxaJuDrLNuqoF4uGxiX+zM9XYn2br/iDo05jK6oOTu5WSOCxQKo
        gnNjKAEHNziV+y8CLWEUBtxCRczfN7WIwVBd7YYP2oNnMkXzBMO0QP2VF2lWT2kF
        QIDAQAB
        -----END PUBLIC KEY-----
      issuer: banking-platform
      audience:
        - banking-api

    rate-limit:
      requests-per-minute-per-user: 1000  # Higher limits for development
      requests-per-minute-per-ip: 2000
      window-size-seconds: 60

    cors:
      allowed-origins:
        - http://localhost:3000    # React dev server
        - http://localhost:3001    # Alternative React port
        - http://127.0.0.1:3000
        - http://127.0.0.1:3001
      allow-credentials: true
      max-age-seconds: 3600

    services:
      # Local development service URLs
      identity-service-url: http://localhost:8082
      user-service-url: http://localhost:8083
      account-service-url: http://localhost:8084
      transaction-service-url: http://localhost:8085
      fraud-service-url: http://localhost:8086
      audit-service-url: http://localhost:8087
      notification-service-url: http://localhost:8088
      chat-service-url: http://localhost:8089
      ai-orchestration-service-url: http://localhost:8090
      document-ingestion-service-url: http://localhost:8091
      analytics-service-url: http://localhost:8092
      statement-service-url: http://localhost:8093

# ── DEVELOPMENT LOGGING ──────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.banking.gateway: DEBUG  # Verbose logging for development
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    io.lettuce: INFO
    reactor.netty: INFO

# ── DEVELOPMENT TRACING ──────────────────────────────────────────────
management:
  tracing:
    sampling:
      probability: 1.0  # Sample all traces in development
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces  # Local Jaeger