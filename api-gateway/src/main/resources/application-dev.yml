# ══════════════════════════════════════════════════════════════════════
# API Gateway — application-dev.yml
# Development profile configuration
# ══════════════════════════════════════════════════════════════════════

spring:
  profiles:
    active: dev

# ── DEVELOPMENT OVERRIDES ────────────────────────────────────────────
server:
  port: 8080

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: "*"  # Expose all actuator endpoints in dev

# ── REDIS (Local Docker) ──────────────────────────────────────────────
spring:
  data:
    redis:
      host: localhost
      port: 6379
      password: ""

# ── BANKING GATEWAY DEV SETTINGS ──────────────────────────────────────
banking:
  gateway:
    jwt:
      # Development RSA public key (matches identity-service dev private key)
      public-key: |
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA4f5wg5l2hKsTeNem/V41
        fGnJm6gOdrj8ym3rFkEjWT2btf06yzRtVy4pv+Q2jdkdyVQ+6XvIIlVtc9+5VgLI
        xVHrQOHNZmrYGAMY9+5xGfeNUROnsHhNz2CaHdNdkiVDdV9lEcww5GeLvDRHQwLI
        -----END PUBLIC KEY-----
      issuer: banking-platform-dev
      audience:
        - banking-api-dev

    rate-limit:
      requests-per-minute-per-user: 1000  # Relaxed for development
      requests-per-minute-per-ip: 2000
      window-size-seconds: 60

    cors:
      allowed-origins:
        - http://localhost:3000
        - http://localhost:3001
        - http://127.0.0.1:3000
        - http://127.0.0.1:3001

    services:
      # Local development URLs
      identity-service-url: http://localhost:8082
      user-service-url: http://localhost:8083
      account-service-url: http://localhost:8084
      transaction-service-url: http://localhost:8085
      fraud-service-url: http://localhost:8086
      audit-service-url: http://localhost:8087
      notification-service-url: http://localhost:8088
      chat-service-url: http://localhost:8089
      ai-orchestration-service-url: http://localhost:8090
      document-ingestion-service-url: http://localhost:8091
      analytics-service-url: http://localhost:8092
      statement-service-url: http://localhost:8093

# ── LOGGING (Verbose for development) ─────────────────────────────────
logging:
  level:
    com.banking.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    io.lettuce: INFO
    reactor.netty: INFO

# ── TRACING (Full sampling in dev) ────────────────────────────────────
management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces