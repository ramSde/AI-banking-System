# ══════════════════════════════════════════════════════════════════════
# API Gateway — application-prod.yml
# Production environment configuration (OpenShift production namespace)
# ══════════════════════════════════════════════════════════════════════

spring:
  profiles:
    active: prod

# ── PRODUCTION OVERRIDES ──────────────────────────────────────────────
server:
  port: 8080

management:
  endpoint:
    health:
      show-details: never  # Security: never expose internal details in prod
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus  # Minimal exposure in prod

# ── REDIS (OpenShift Redis service with TLS) ──────────────────────────
spring:
  data:
    redis:
      host: redis.banking-prod.svc.cluster.local
      port: 6379
      password: ${REDIS_PASSWORD}  # Injected from OpenShift Secret
      ssl:
        enabled: true  # TLS encryption in production
      lettuce:
        pool:
          max-active: 50  # Higher pool size for production load
          max-idle: 20
          min-idle: 5

# ── BANKING GATEWAY PRODUCTION SETTINGS ───────────────────────────────
banking:
  gateway:
    jwt:
      # Production RSA public key (injected from OpenShift Secret/Vault)
      public-key: ${JWT_PUBLIC_KEY}
      issuer: banking-platform-prod
      audience:
        - banking-api-prod

    rate-limit:
      requests-per-minute-per-user: 100  # Strict production limits
      requests-per-minute-per-ip: 200
      window-size-seconds: 60

    cors:
      allowed-origins:
        - https://banking.example.com
        - https://admin.banking.example.com
        # No localhost or development URLs in production

    services:
      # OpenShift DNS format for production namespace
      identity-service-url: http://identity-service.banking-prod.svc.cluster.local:8080
      user-service-url: http://user-service.banking-prod.svc.cluster.local:8080
      account-service-url: http://account-service.banking-prod.svc.cluster.local:8080
      transaction-service-url: http://transaction-service.banking-prod.svc.cluster.local:8080
      fraud-service-url: http://fraud-service.banking-prod.svc.cluster.local:8080
      audit-service-url: http://audit-service.banking-prod.svc.cluster.local:8080
      notification-service-url: http://notification-service.banking-prod.svc.cluster.local:8080
      chat-service-url: http://chat-service.banking-prod.svc.cluster.local:8080
      ai-orchestration-service-url: http://ai-orchestration-service.banking-prod.svc.cluster.local:8080
      document-ingestion-service-url: http://document-ingestion-service.banking-prod.svc.cluster.local:8080
      analytics-service-url: http://analytics-service.banking-prod.svc.cluster.local:8080
      statement-service-url: http://statement-service.banking-prod.svc.cluster.local:8080

# ── LOGGING (Minimal for production) ──────────────────────────────────
logging:
  level:
    com.banking.gateway: INFO
    org.springframework.cloud.gateway: WARN
    org.springframework.security: WARN
    io.lettuce: ERROR
    reactor.netty: ERROR
    root: WARN  # Reduce log volume in production

# ── TRACING (Minimal sampling for production) ─────────────────────────
management:
  tracing:
    sampling:
      probability: 0.01  # 1% sampling to minimize performance impact
  otlp:
    tracing:
      endpoint: http://jaeger-collector.observability.svc.cluster.local:4318/v1/traces

# ── SECURITY HARDENING ────────────────────────────────────────────────
server:
  error:
    include-message: never  # Never expose error messages in production
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false