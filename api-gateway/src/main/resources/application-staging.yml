server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS}
  
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

management:
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 0.5

logging:
  level:
    root: INFO
    com.banking.gateway: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO

gateway:
  rate-limit:
    enabled: true
    per-user-limit: 100
    per-ip-limit: 200
  
  routes:
    identity-service:
      uri: http://identity-service.banking-staging.svc.cluster.local:8080
    otp-service:
      uri: http://otp-service.banking-staging.svc.cluster.local:8080
    mfa-service:
      uri: http://mfa-service.banking-staging.svc.cluster.local:8080
    risk-auth-service:
