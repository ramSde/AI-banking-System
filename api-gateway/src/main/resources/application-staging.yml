# ══════════════════════════════════════════════════════════════════════
# API Gateway — application-staging.yml
# Staging environment configuration (OpenShift staging namespace)
# ══════════════════════════════════════════════════════════════════════

spring:
  profiles:
    active: staging

# ── STAGING OVERRIDES ────────────────────────────────────────────────
server:
  port: 8080

management:
  endpoint:
    health:
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway

# ── REDIS (OpenShift Redis service) ───────────────────────────────────
spring:
  data:
    redis:
      host: redis.banking-staging.svc.cluster.local
      port: 6379
      password: ${REDIS_PASSWORD}  # Injected from OpenShift Secret

# ── BANKING GATEWAY STAGING SETTINGS ──────────────────────────────────
banking:
  gateway:
    jwt:
      # Staging RSA public key (injected from OpenShift Secret)
      public-key: ${JWT_PUBLIC_KEY}
      issuer: banking-platform-staging
      audience:
        - banking-api-staging

    rate-limit:
      requests-per-minute-per-user: 200  # Moderate limits for staging
      requests-per-minute-per-ip: 400
      window-size-seconds: 60

    cors:
      allowed-origins:
        - https://banking-web-staging.apps.openshift.example.com
        - https://banking-admin-staging.apps.openshift.example.com

    services:
      # OpenShift DNS format for staging namespace
      identity-service-url: http://identity-service.banking-staging.svc.cluster.local:8080
      user-service-url: http://user-service.banking-staging.svc.cluster.local:8080
      account-service-url: http://account-service.banking-staging.svc.cluster.local:8080
      transaction-service-url: http://transaction-service.banking-staging.svc.cluster.local:8080
      fraud-service-url: http://fraud-service.banking-staging.svc.cluster.local:8080
      audit-service-url: http://audit-service.banking-staging.svc.cluster.local:8080
      notification-service-url: http://notification-service.banking-staging.svc.cluster.local:8080
      chat-service-url: http://chat-service.banking-staging.svc.cluster.local:8080
      ai-orchestration-service-url: http://ai-orchestration-service.banking-staging.svc.cluster.local:8080
      document-ingestion-service-url: http://document-ingestion-service.banking-staging.svc.cluster.local:8080
      analytics-service-url: http://analytics-service.banking-staging.svc.cluster.local:8080
      statement-service-url: http://statement-service.banking-staging.svc.cluster.local:8080

# ── LOGGING (Balanced for staging) ────────────────────────────────────
logging:
  level:
    com.banking.gateway: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
    io.lettuce: WARN
    reactor.netty: WARN

# ── TRACING (Reduced sampling for staging) ────────────────────────────
management:
  tracing:
    sampling:
      probability: 0.1  # 10% sampling to reduce overhead
  otlp:
    tracing:
      endpoint: http://jaeger-collector.observability.svc.cluster.local:4318/v1/traces