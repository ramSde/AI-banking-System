# ══════════════════════════════════════════════════════════════════════
# Banking Platform — Docker Compose for Local Development
# This file is for LOCAL DEVELOPMENT ONLY — NOT for production
# Production deployment uses OpenShift/Kubernetes
# ══════════════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ── DATABASES ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: banking-postgres
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_MULTIPLE_DATABASES: identity,users,accounts,transactions,fraud,audit,notifications,chat,ai,documents,analytics,statements
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d banking"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  # ── REDIS ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: banking-redis
    command: redis-server --appendonly yes --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - banking-network

  # ── KAFKA ECOSYSTEM ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: banking-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - banking-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: banking-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: banking-schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - banking-network

  # ── OBJECT STORAGE ───────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: banking-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - banking-network

  # ── OBSERVABILITY ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: banking-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - banking-network

  grafana:
    image: grafana/grafana:latest
    container_name: banking-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - banking-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: banking-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    networks:
      - banking-network

  # ── AI INFRASTRUCTURE ────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: banking-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_HTTP_PORT: 8000
    networks:
      - banking-network

  # ── API GATEWAY ──────────────────────────────────────────────────
  api-gateway:
    build:
      context: ../../api-gateway
      dockerfile: Dockerfile
    container_name: banking-api-gateway
    depends_on:
      - postgres
      - redis
      - kafka
    ports:
      - "8080:8080"
      - "8081:8081"  # Management port
    environment:
      SPRING_PROFILES_ACTIVE: dev
      REDIS_HOST: redis
      REDIS_PASSWORD: redis123
      JWT_PUBLIC_KEY: |
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA4f5wg5l2hKsTeNem/V41
        fGnJm6gOdrj8ym3rFkEjWT2btf06kkstX2LvAjYdgGnI8Ej2BpmfciHlMa8sc4VQ
        kOKvjgdHBmGHqmM5dcgKxYWtLVHZ6z/LKnZyuGBrBBYklJGdO6z1xWxJw4ej2UcN
        lXxyFn6vNjvQoaq30cINhw4f2VdF9yxqHcauHOobwuIM3fRZ6s/iiPPFRTAcrbBY
        uqBInrT3A/sczRxaJuDrLNuqoF4uGxiX+zM9XYn2br/iDo05jK6oOTu5WSOCxQKo
        gnNjKAEHNziV+y8CLWEUBtxCRczfN7WIwVBd7YYP2oNnMkXzBMO0QP2VF2lWT2kF
        QIDAQAB
        -----END PUBLIC KEY-----
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    networks:
      - banking-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── VOLUMES ───────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  minio_data:
  prometheus_data:
  grafana_data:
  chromadb_data:

# ── NETWORKS ──────────────────────────────────────────────────────────
networks:
  banking-network:
    driver: bridge