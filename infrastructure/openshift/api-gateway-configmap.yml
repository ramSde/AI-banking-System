apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: banking-prod
  labels:
    app: api-gateway
    component: gateway
    tier: infrastructure
data:
  # JWT Configuration
  jwt-issuer: "banking-platform-prod"
  jwt-audience: "banking-api-prod"
  
  # Rate Limiting Configuration
  RATE_LIMIT_PER_USER: "100"
  RATE_LIMIT_PER_IP: "200"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  
  # CORS Configuration
  CORS_ALLOWED_ORIGIN_1: "https://banking.example.com"
  CORS_MAX_AGE_SECONDS: "3600"
  
  # Downstream Service URLs (OpenShift DNS)
  IDENTITY_SERVICE_URL: "http://identity-service.banking-prod.svc.cluster.local:8080"
  USER_SERVICE_URL: "http://user-service.banking-prod.svc.cluster.local:8080"
  ACCOUNT_SERVICE_URL: "http://account-service.banking-prod.svc.cluster.local:8080"
  TRANSACTION_SERVICE_URL: "http://transaction-service.banking-prod.svc.cluster.local:8080"
  FRAUD_SERVICE_URL: "http://fraud-service.banking-prod.svc.cluster.local:8080"
  AUDIT_SERVICE_URL: "http://audit-service.banking-prod.svc.cluster.local:8080"
  NOTIFICATION_SERVICE_URL: "http://notification-service.banking-prod.svc.cluster.local:8080"
  CHAT_SERVICE_URL: "http://chat-service.banking-prod.svc.cluster.local:8080"
  AI_ORCHESTRATION_SERVICE_URL: "http://ai-orchestration-service.banking-prod.svc.cluster.local:8080"
  DOCUMENT_INGESTION_SERVICE_URL: "http://document-ingestion-service.banking-prod.svc.cluster.local:8080"
  ANALYTICS_SERVICE_URL: "http://analytics-service.banking-prod.svc.cluster.local:8080"
  STATEMENT_SERVICE_URL: "http://statement-service.banking-prod.svc.cluster.local:8080"
  
  # Gateway HTTP Client Configuration
  GATEWAY_HTTP_CONNECT_TIMEOUT_MS: "5000"
  GATEWAY_HTTP_RESPONSE_TIMEOUT_MS: "30000"
  GATEWAY_HTTP_POOL_MAX_CONNECTIONS: "500"
  GATEWAY_HTTP_POOL_MAX_IDLE_TIME_MS: "20000"
  
  # Actuator Configuration
  HEALTH_SHOW_DETAILS: "never"
  
  # Logging Configuration
  LOG_LEVEL_ROOT: "WARN"
  LOG_LEVEL_GATEWAY: "INFO"
  LOG_LEVEL_SCG: "WARN"
  LOG_LEVEL_LETTUCE: "ERROR"
  LOG_LEVEL_NETTY: "ERROR"
  
  # Circuit Breaker Configuration
  CIRCUIT_BREAKER_FAILURE_RATE: "50"
  CIRCUIT_BREAKER_WAIT_DURATION: "30s"
  CIRCUIT_BREAKER_HALF_OPEN_CALLS: "5"
  CIRCUIT_BREAKER_SLIDING_WINDOW: "10"
  CIRCUIT_BREAKER_MIN_CALLS: "5"
  
  # Tracing Configuration
  TRACING_SAMPLING_PROBABILITY: "0.01"
  
  # Environment Metadata
  ENVIRONMENT: "prod"