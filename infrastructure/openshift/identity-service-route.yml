apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: identity-service
  namespace: banking-platform
  labels:
    app: identity-service
spec:
  host: identity.banking-platform.apps.cluster.example.com
  to:
    kind: Service
    name: identity-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
