apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: banking-platform
  labels:
    app: identity-service
    tier: backend
    component: authentication
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: identity-service
        tier: backend
        component: authentication
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: identity-service
      
      # Init container: wait for dependencies
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
        
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-service 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready"
        
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z kafka-service 9092; do
                echo "Waiting for Kafka..."
                sleep 2
              done
              echo "Kafka is ready"
      
      containers:
        - name: identity-service
          image: your-registry/identity-service:latest
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: management
              containerPort: 8081
              protocol: TCP
          
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: identity-service-config
                  key: db.host
            
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: identity-service-config
                  key: db.port
            
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: identity-service-config
                  key: db.name
            
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: identity-service-secret
                  key: db.username
            
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: identity-service-secret
                  key: db.password
            
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: identity-service-config
                  key: redis.host
            
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: identity-service-config
                  key: redis.port
            
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: identity-service-secret
                  key: redis.password
            
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: identity-service-config
                  key: kafka.bootstrap-servers
            
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: identity-service-secret
                  key: jwt.private-key
            
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: identity-service-secret
                  key: jwt.public-key
            
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: identity-service-config
                  key: otel.endpoint
          
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
      
      terminationGracePeriodSeconds: 30
