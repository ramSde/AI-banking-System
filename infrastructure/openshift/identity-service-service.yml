apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: banking-platform
  labels:
    app: identity-service
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: identity-service
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: management
      port: 8081
      targetPort: management
      protocol: TCP
  sessionAffinity: None
