# ══════════════════════════════════════════════════════════════════════
# API Gateway — OpenShift Secret
# Sensitive configuration values for production
# IMPORTANT: Replace placeholder values with actual secrets
# ══════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secrets
  namespace: banking-prod
  labels:
    app: api-gateway
    component: gateway
type: Opaque
stringData:
  # Redis Password
  REDIS_PASSWORD: "REPLACE_WITH_ACTUAL_REDIS_PASSWORD"
  
  # JWT RSA Public Key (Base64 encoded PEM format)
  # This MUST match the private key used by Identity Service
  # Generate using: openssl rsa -in private_key.pem -pubout -out public_key.pem
  JWT_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_WITH_ACTUAL_RSA_PUBLIC_KEY_IN_PEM_FORMAT
    MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA...
    ...REPLACE_WITH_ACTUAL_KEY_CONTENT...
    QIDAQAB
    -----END PUBLIC KEY-----

---
# ══════════════════════════════════════════════════════════════════════
# Alternative: Using External Secrets Operator (Recommended)
# This approach fetches secrets from HashiCorp Vault or AWS Secrets Manager
# ══════════════════════════════════════════════════════════════════════

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-gateway-external-secrets
  namespace: banking-prod
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: api-gateway-secrets
    creationPolicy: Owner
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: banking/redis
        property: password
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: banking/jwt
        property: public_key

---
# ══════════════════════════════════════════════════════════════════════
# Vault SecretStore Configuration (if using HashiCorp Vault)
# ══════════════════════════════════════════════════════════════════════

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: banking-prod
spec:
  provider:
    vault:
      server: "https://vault.your-domain.com"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "banking-api-gateway"
          serviceAccountRef:
            name: "api-gateway-sa"