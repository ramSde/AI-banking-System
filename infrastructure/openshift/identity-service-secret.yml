apiVersion: v1
kind: Secret
metadata:
  name: identity-service-secret
  namespace: banking-platform
  labels:
    app: identity-service
type: Opaque
stringData:
  # Database credentials
  db.username: "identity_user"
  db.password: "CHANGE_ME_IN_PRODUCTION"
  
  # Redis password
  redis.password: "CHANGE_ME_IN_PRODUCTION"
  
  # JWT RSA keys (base64 encoded PEM format)
  # Generate with:
  #   openssl genrsa -out private_key.pem 2048
  #   openssl rsa -in private_key.pem -pubout -out public_key.pem
  jwt.private-key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_ACTUAL_PRIVATE_KEY
    -----END PRIVATE KEY-----
  
  jwt.public-key: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_WITH_ACTUAL_PUBLIC_KEY
    -----END PUBLIC KEY-----

---
# Note: In production, use HashiCorp Vault or Sealed Secrets instead of plain Secrets
# Example with Vault:
# apiVersion: v1
# kind: Secret
# metadata:
#   name: identity-service-secret
#   annotations:
#     vault.hashicorp.com/agent-inject: "true"
#     vault.hashicorp.com/role: "identity-service"
#     vault.hashicorp.com/agent-inject-secret-db: "secret/data/banking/identity/db"
#     vault.hashicorp.com/agent-inject-secret-jwt: "secret/data/banking/identity/jwt"
