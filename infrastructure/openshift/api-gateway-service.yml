apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: banking-prod
  labels:
    app: api-gateway
    component: gateway
    tier: infrastructure
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/actuator/prometheus"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: management
      port: 8081
      targetPort: management
      protocol: TCP
  selector:
    app: api-gateway

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: api-gateway
  namespace: banking-prod
  labels:
    app: api-gateway
    component: gateway
    tier: infrastructure
  annotations:
    haproxy.router.openshift.io/timeout: "60s"
    haproxy.router.openshift.io/rate-limit-connections: "true"
    haproxy.router.openshift.io/rate-limit-connections.concurrent-tcp: "100"
    haproxy.router.openshift.io/rate-limit-connections.rate-http: "1000"
spec:
  host: api.banking.example.com
  to:
    kind: Service
    name: api-gateway
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None