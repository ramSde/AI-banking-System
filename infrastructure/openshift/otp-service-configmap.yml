apiVersion: v1
kind: ConfigMap
metadata:
  name: otp-service-config
  namespace: banking-platform
  labels:
    app: otp-service
data:
  db.host: "postgres-service"
  db.port: "5432"
  db.name: "otp_db"
  redis.host: "redis-service"
  redis.port: "6379"
  kafka.bootstrap.servers: "kafka-service:9092"
  otp.length: "6"
  otp.ttl.seconds: "300"
  otp.max.attempts: "3"
  otp.rate.limit.per.user: "3"
  otp.rate.limit.window.seconds: "300"
  totp.issuer: "BankingPlatform"
  totp.period.seconds: "30"
  totp.digits: "6"
  totp.algorithm: "HmacSHA1"
  totp.time.step.tolerance: "1"
  backup.code.length: "12"
  backup.code.count: "8"
  bcrypt.strength: "12"
