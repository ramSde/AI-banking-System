server:
  port: ${SERVER_PORT:8012}
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  tomcat:
    threads:
      max: ${TOMCAT_THREADS_MAX:200}
      min-spare: ${TOMCAT_THREADS_MIN_SPARE:10}
    accept-count: ${TOMCAT_ACCEPT_COUNT:100}

spring:
  application:
    name: document-ingestion-service
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/banking_documents?autoReconnect=true&useSSL=false&characterEncoding=utf8}
    username: ${DATABASE_USERNAME:admin}
    password: ${DATABASE_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
      connection-test-query: SELECT 1
      pool-name: DocumentIngestionHikariPool
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false
  
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog-master.xml
    default-schema: public
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2000}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:8}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:2}
          max-wait: ${REDIS_POOL_MAX_WAIT:2000}
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: ${KAFKA_PRODUCER_RETRIES:3}
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        max.request.size: ${KAFKA_MAX_REQUEST_SIZE:10485760}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:banking-document-ingestion-consumer-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.banking.document.event
        isolation.level: read_committed
      enable-auto-commit: false
    listener:
      ack-mode: manual_immediate
  
  servlet:
    multipart:
      enabled: true
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:15MB}
  
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4}
          temperature: 0.7
    vectorstore:
      chroma:
        client:
          host: ${CHROMA_HOST:localhost}
          port: ${CHROMA_PORT:8000}
        collection-name: ${CHROMA_COLLECTION_NAME:banking_documents}
        initialize-schema: true

# MinIO Configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:password}
  bucket-name: ${MINIO_BUCKET_NAME:banking-documents}
  secure: ${MINIO_SECURE:false}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-minimum-256-bits-required-for-hs256}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# Document Processing Configuration
document:
  processing:
    chunk-size: ${DOCUMENT_CHUNK_SIZE:1000}
    chunk-overlap: ${DOCUMENT_CHUNK_OVERLAP:200}
    max-file-size-mb: ${DOCUMENT_MAX_FILE_SIZE_MB:10}
    allowed-mime-types: ${DOCUMENT_ALLOWED_MIME_TYPES:application/pdf,image/png,image/jpeg,image/jpg}
    tesseract-data-path: ${TESSERACT_DATA_PATH:/usr/share/tesseract-ocr/4.00/tessdata}
    tesseract-language: ${TESSERACT_LANGUAGE:eng}
  
  kafka:
    topics:
      upload-requested: ${KAFKA_TOPIC_UPLOAD_REQUESTED:banking.documents.upload-requested}
      processed: ${KAFKA_TOPIC_PROCESSED:banking.documents.processed}
      processing-failed: ${KAFKA_TOPIC_PROCESSING_FAILED:banking.documents.processing-failed}
      dlq: ${KAFKA_TOPIC_DLQ:banking.documents.upload-requested.dlq}
      retry: ${KAFKA_TOPIC_RETRY:banking.documents.upload-requested.retry}

# Async Configuration
async:
  core-pool-size: ${ASYNC_CORE_POOL_SIZE:10}
  max-pool-size: ${ASYNC_MAX_POOL_SIZE:50}
  queue-capacity: ${ASYNC_QUEUE_CAPACITY:100}
  thread-name-prefix: ${ASYNC_THREAD_NAME_PREFIX:async-document-}

# Resilience4j Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      minioService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 5s
      embeddingService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 60s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 10s
      vectorStoreService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 5s
  
  retry:
    instances:
      minioService:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
      embeddingService:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
      vectorStoreService:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_SHOW_DETAILS:when-authorized}
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}

# Logging Configuration
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.banking.document: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: ${LOG_LEVEL_SPRING_WEB:INFO}
    org.springframework.security: ${LOG_LEVEL_SPRING_SECURITY:INFO}
    org.springframework.kafka: ${LOG_LEVEL_KAFKA:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE_SQL:INFO}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_HIBERNATE_BINDER:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: true
