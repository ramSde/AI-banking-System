# ══════════════════════════════════════════════════════════════════════
# k8s/service.yml — ClusterIP Service for API Gateway
# ══════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: banking
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: management
      port: 8081
      targetPort: 8081
      protocol: TCP

---
# ══════════════════════════════════════════════════════════════════════
# k8s/configmap.yml — Non-sensitive configuration
# Sensitive values (JWT_PUBLIC_KEY, REDIS_PASSWORD) are in Secret.
# ══════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: banking
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  MANAGEMENT_PORT: "8081"
  JWT_ISSUER: "banking-platform"
  JWT_AUDIENCE: "banking-api"
  RATE_LIMIT_PER_USER: "60"
  RATE_LIMIT_PER_IP: "120"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  CORS_ALLOWED_ORIGIN_1: "https://banking-platform.com"
  CORS_MAX_AGE_SECONDS: "3600"
  REDIS_HOST: "redis.banking.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DATABASE: "0"
  REDIS_CONNECT_TIMEOUT_MS: "2000"
  REDIS_COMMAND_TIMEOUT_MS: "3000"
  REDIS_POOL_MAX_ACTIVE: "20"
  REDIS_POOL_MAX_IDLE: "10"
  REDIS_POOL_MIN_IDLE: "2"
  REDIS_POOL_MAX_WAIT_MS: "3000"
  GATEWAY_HTTP_CONNECT_TIMEOUT_MS: "5000"
  GATEWAY_HTTP_RESPONSE_TIMEOUT_MS: "30000"
  GATEWAY_HTTP_POOL_MAX_CONNECTIONS: "500"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4318/v1/traces"
  TRACING_SAMPLING_PROBABILITY: "0.1"
  LOG_LEVEL_ROOT: "WARN"
  LOG_LEVEL_GATEWAY: "INFO"
  HEALTH_SHOW_DETAILS: "never"
  IDENTITY_SERVICE_URL: "http://identity-service.banking.svc.cluster.local:8082"
  USER_SERVICE_URL: "http://user-service.banking.svc.cluster.local:8083"
  ACCOUNT_SERVICE_URL: "http://account-service.banking.svc.cluster.local:8084"
  TRANSACTION_SERVICE_URL: "http://transaction-service.banking.svc.cluster.local:8085"
  FRAUD_SERVICE_URL: "http://fraud-service.banking.svc.cluster.local:8086"
  AUDIT_SERVICE_URL: "http://audit-service.banking.svc.cluster.local:8087"
  NOTIFICATION_SERVICE_URL: "http://notification-service.banking.svc.cluster.local:8088"
  CHAT_SERVICE_URL: "http://chat-service.banking.svc.cluster.local:8089"
  AI_ORCHESTRATION_SERVICE_URL: "http://ai-orchestration-service.banking.svc.cluster.local:8090"
  DOCUMENT_INGESTION_SERVICE_URL: "http://document-ingestion-service.banking.svc.cluster.local:8091"
  ANALYTICS_SERVICE_URL: "http://analytics-service.banking.svc.cluster.local:8092"
  STATEMENT_SERVICE_URL: "http://statement-service.banking.svc.cluster.local:8093"

---
# ══════════════════════════════════════════════════════════════════════
# k8s/secret.yml — Sensitive values (template — fill via CI/CD or Vault)
# In production: use Sealed Secrets or inject from HashiCorp Vault.
# NEVER commit actual secret values to source control.
# ══════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secrets
  namespace: banking
type: Opaque
stringData:
  # Vault reference (if using Vault agent injector):
  # vault.hashicorp.com/agent-inject: "true"
  # vault.hashicorp.com/role: "api-gateway"
  # vault.hashicorp.com/agent-inject-secret-jwt: "secret/banking/jwt"
  jwt-public-key: "REPLACE_WITH_ACTUAL_RSA_PUBLIC_KEY_VIA_CI_CD"

---
# ══════════════════════════════════════════════════════════════════════
# k8s/hpa.yml — Horizontal Pod Autoscaler
# Scales the gateway between 2 and 10 replicas based on CPU.
# ══════════════════════════════════════════════════════════════════════
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: banking
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 min cooldown before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
# ══════════════════════════════════════════════════════════════════════
# k8s/pdb.yml — PodDisruptionBudget
# Ensures at least 1 gateway pod is always available during:
#   - Node drains (kubectl drain)
#   - Rolling updates
#   - Zone maintenance
# ══════════════════════════════════════════════════════════════════════
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: banking
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway

---
# ══════════════════════════════════════════════════════════════════════
# k8s/networkpolicy.yml — Network Policy
# Only allows traffic from the K8s ingress controller to the gateway.
# Blocks all direct pod-to-pod traffic from outside the banking namespace.
# ══════════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-network-policy
  namespace: banking
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow traffic from ingress controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    # Allow Prometheus scraping from observability namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 8081

  egress:
    # Allow outbound to all banking namespace services (downstream routing)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: banking
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Allow OTLP trace export to observability namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 4318
