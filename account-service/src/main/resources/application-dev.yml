spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/account_db
    username: admin
    password: admin
  
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  data:
    redis:
      host: localhost
      port: 6379
  
  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    root: INFO
    com.banking: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

account:
  cache:
    balance-ttl: 5
    details-ttl: 15
