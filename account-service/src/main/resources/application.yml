spring:
  application:
    name: account-service
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/account_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_MIN_IDLE:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      pool-name: AccountServiceHikariPool
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false
  
  liquibase:
    change-log: classpath:db/changelog/changelog-master.xml
    enabled: true
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:20}
          max-idle: ${REDIS_POOL_MAX_IDLE:10}
          min-idle: ${REDIS_POOL_MIN_IDLE:5}
          max-wait: 2000ms
      timeout: 3000ms
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        max.request.size: 10485760
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:account-service-consumer-group}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "*"
        isolation.level: read_committed
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: ${SERVER_PORT:8086}
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: ${MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED:true}
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.banking: ${LOGGING_LEVEL_COM_BANKING:DEBUG}
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

account:
  cache:
    balance-ttl: ${ACCOUNT_CACHE_BALANCE_TTL:5}
    details-ttl: ${ACCOUNT_CACHE_DETAILS_TTL:15}
  number:
    prefix: ${ACCOUNT_NUMBER_PREFIX:ACC}
  iban:
    country-code: ${ACCOUNT_IBAN_COUNTRY_CODE:US}
    bank-code: ${ACCOUNT_IBAN_BANK_CODE:BANK}
  default-currency: ${ACCOUNT_DEFAULT_CURRENCY:USD}
  min-balance:
    savings: ${ACCOUNT_MIN_BALANCE_SAVINGS:100.00}
    checking: ${ACCOUNT_MIN_BALANCE_CHECKING:0.00}
  max-accounts-per-user: ${ACCOUNT_MAX_ACCOUNTS_PER_USER:10}

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
