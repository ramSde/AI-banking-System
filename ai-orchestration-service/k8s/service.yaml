apiVersion: v1
kind: Service
metadata:
  name: ai-orchestration-service
  namespace: banking
  labels:
    app: ai-orchestration-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/actuator/prometheus"
spec:
  type: ClusterIP
  selector:
    app: ai-orchestration-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  sessionAffinity: None
