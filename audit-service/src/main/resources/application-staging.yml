spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?autoReconnect=true&useSSL=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: banking-audit-service-consumer-group-staging
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG}

server:
  port: 8080

management:
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 0.5

logging:
  level:
    root: INFO
    com.banking.audit: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.springframework.kafka: INFO
    org.hibernate.SQL: WARN

audit:
  retention-days: 2555
  query-max-results: 1000
  partition-enabled: true
  partition-interval-months: 3

jwt:
  secret: ${JWT_SECRET}
  expiration: 900000

springdoc:
  swagger-ui:
    enabled: true
