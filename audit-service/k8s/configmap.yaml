apiVersion: v1
kind: ConfigMap
metadata:
  name: audit-service-config
data:
  db.host: "postgres-service"
  db.port: "5432"
  db.name: "audit_db"
  kafka.bootstrap.servers: "kafka-service:9092"
  audit.retention.days: "2555"
  audit.query.max.results: "1000"
  audit.partition.enabled: "true"
  audit.partition.interval.months: "3"
