spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/banking_ai_insights?autoReconnect=true&useSSL=false&characterEncoding=utf8
  
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.banking.insight: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

insight:
  generation:
    enabled: true
  anomaly:
    detection:
      enabled: true
  recommendation:
    enabled: true
