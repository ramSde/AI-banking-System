# User Service - Staging Profile

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5

  jpa:
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

# Logging
logging:
  level:
    root: INFO
    com.banking.user: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

# Actuator
management:
  endpoint:
    health:
      show-details: when-authorized

# Swagger
springdoc:
  swagger-ui:
    enabled: true

# User Configuration
user:
  encryption:
    algorithm: ${USER_ENCRYPTION_ALGORITHM}
    key: ${USER_ENCRYPTION_KEY}
  cache:
    profile-ttl-minutes: ${USER_CACHE_PROFILE_TTL:15}
    preference-ttl-minutes: ${USER_CACHE_PREFERENCE_TTL:30}
  kyc:
    document-max-size-mb: ${USER_KYC_DOC_MAX_SIZE:10}
    verification-expiry-days: ${USER_KYC_EXPIRY_DAYS:365}

# JWT
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
