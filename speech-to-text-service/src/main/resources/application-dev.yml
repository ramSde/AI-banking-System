spring:
  # Development Profile Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/banking_stt_dev?autoReconnect=true&useSSL=false
    username: ${DB_USERNAME:dev_user}
    password: ${DB_PASSWORD:dev_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

server:
  port: ${SERVER_PORT:8019}

stt:
  whisper:
    api-key: ${OPENAI_API_KEY:sk-dev-key}
    api-url: ${WHISPER_API_URL:https://api.openai.com/v1/audio/transcriptions}
    model: whisper-1
    timeout-seconds: 120
    max-retries: 3
  
  audio:
    max-file-size-mb: 25
    max-duration-minutes: 30
    supported-formats: mp3,wav,m4a,flac,ogg,webm
  
  storage:
    type: minio
    endpoint: http://localhost:9000
    bucket: banking-audio-files-dev
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin}
  
  processing:
    max-concurrent-jobs: 5
    enable-diarization-by-default: false

jwt:
  secret: ${JWT_SECRET:dev-secret-key-for-testing-only-not-for-production}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.banking.stt: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true
