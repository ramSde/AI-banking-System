spring:
  # Production Profile Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ssl=true&sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl: true
      lettuce:
        pool:
          max-active: 30
          max-idle: 15
          min-idle: 10
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: stt-consumer-group-prod
      properties:
        security.protocol: SASL_SSL
        sasl.mechanism: PLAIN
    producer:
      properties:
        security.protocol: SASL_SSL
        sasl.mechanism: PLAIN
  
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

server:
  port: ${SERVER_PORT:8019}
  compression:
    enabled: true
  tomcat:
    threads:
      max: 300
      min-spare: 20
    accept-count: 200
    max-connections: 20000

stt:
  whisper:
    api-key: ${OPENAI_API_KEY}
    api-url: ${WHISPER_API_URL:https://api.openai.com/v1/audio/transcriptions}
    model: whisper-1
    timeout-seconds: 120
    max-retries: 3
  
  audio:
    max-file-size-mb: 25
    max-duration-minutes: 30
    supported-formats: mp3,wav,m4a,flac,ogg,webm
  
  storage:
    type: ${STORAGE_TYPE:s3}
    endpoint: ${STORAGE_ENDPOINT}
    bucket: ${STORAGE_BUCKET}
    access-key: ${STORAGE_ACCESS_KEY}
    secret-key: ${STORAGE_SECRET_KEY}
  
  processing:
    max-concurrent-jobs: 20
    enable-diarization-by-default: false

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      environment: production

logging:
  level:
    root: WARN
    com.banking.stt: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/speech-to-text-service/application.log
    max-size: 100MB
    max-history: 30

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: true

# Resilience4j Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      whisper-api:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  
  retry:
    instances:
      whisper-api:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
