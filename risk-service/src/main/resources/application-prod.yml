spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/risk_db?autoReconnect=true&useSSL=true&characterEncoding=utf8&sslmode=require
    hikari:
      maximum-pool-size: 50
      minimum-idle: 15
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 30
          max-idle: 15
          min-idle: 10
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      retries: 5
    consumer:
      properties:
        max.poll.interval.ms: 600000

server:
  port: 8083
  tomcat:
    threads:
      max: 300
      min-spare: 20

logging:
  level:
    root: WARN
    com.banking: INFO

jwt:
  public-key-path: ${JWT_PUBLIC_KEY_PATH}
  issuer: ${JWT_ISSUER}

external:
  otp-service:
    url: ${OTP_SERVICE_URL}
    timeout: 10000
  identity-service:
    url: ${IDENTITY_SERVICE_URL}
    timeout: 10000

risk:
  cache:
    ttl-seconds: 600
