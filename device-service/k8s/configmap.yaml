apiVersion: v1
kind: ConfigMap
metadata:
  name: device-service-config
data:
  # Database Configuration
  db.url: "jdbc:postgresql://postgres-service:5432/device_db?autoReconnect=true&useSSL=true&characterEncoding=utf8"
  
  # Redis Configuration
  redis.host: "redis-service"
  redis.port: "6379"
  
  # Kafka Configuration
  kafka.bootstrap.servers: "kafka-service:9092"
  kafka.consumer.group.id: "device-service-consumer-group"
  
  # Application Configuration
  server.port: "8084"
  spring.profiles.active: "prod"
  
  # Device Configuration
  device.trust.initial.score: "30"
  device.trust.max.score: "100"
  device.trust.min.score: "0"
  device.cache.ttl.minutes: "15"
  device.anomaly.impossible.travel.speed: "800"
  device.anomaly.max.location.change: "500"
