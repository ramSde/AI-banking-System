# Device Intelligence Service - Production Profile

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 20
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG}

# Server
server:
  tomcat:
    threads:
      max: 300
      min-spare: 20

# Logging
logging:
  level:
    root: WARN
    com.banking.device: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# Actuator
management:
  endpoint:
    health:
      show-details: never

# Swagger
springdoc:
  swagger-ui:
    enabled: false

# Device Configuration
device:
  fingerprint:
    salt: ${DEVICE_FINGERPRINT_SALT}
  trust:
    initial-score: 30
  cache:
    ttl-minutes: 15
  anomaly:
    impossible-travel-speed-kmh: 800
    max-location-change-km: 500

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      deviceService:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 40
