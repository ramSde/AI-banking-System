spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?autoReconnect=true&useSSL=true&sslmode=require&characterEncoding=utf8
    hikari:
      maximum-pool-size: 50
      minimum-idle: 15
      leak-detection-threshold: 60000
  
  jpa:
    show-sql: false
    properties:
      hibernate:
        generate_statistics: false
  
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: SCRAM-SHA-512
      ssl.endpoint.identification.algorithm: https

server:
  port: 8080
  tomcat:
    threads:
      max: 300
      min-spare: 20

logging:
  level:
    root: WARN
    com.banking: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate: WARN

otp:
  ttl-seconds: 300
  max-attempts: 3
  rate-limit:
    per-user: 3
    window-seconds: 300

management:
  endpoint:
    health:
      show-details: never
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 0.1
