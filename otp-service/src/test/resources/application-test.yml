spring:
  datasource:
    url: jdbc:tc:postgresql:16:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  
  data:
    redis:
      host: localhost
      port: 6379
  
  kafka:
    bootstrap-servers: localhost:9092

otp:
  ttl-seconds: 300
  max-attempts: 3
  totp:
    issuer: BankingPlatformTest
    period-seconds: 30
    digits: 6
    algorithm: HmacSHA1
    time-step-tolerance: 1

logging:
  level:
    root: INFO
    com.banking: DEBUG
