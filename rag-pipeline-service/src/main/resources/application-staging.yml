server:
  port: 8013

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?autoReconnect=true&useSSL=true&characterEncoding=utf8
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
  
  jpa:
    show-sql: false
  
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl: true
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: PLAIN
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG}

spring.ai:
  openai:
    api-key: ${OPENAI_API_KEY}
  
  vectorstore:
    chroma:
      client:
        host: ${CHROMADB_HOST}
        port: ${CHROMADB_PORT}

rag:
  retrieval:
    top-k: 10
    similarity-threshold: 0.75
  
  reranking:
    enabled: true
    top-n: 5
  
  context:
    max-tokens: 4000
  
  cache:
    enabled: true
    ttl-seconds: 7200
    similarity-threshold: 0.95

management:
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 0.5

logging:
  level:
    root: INFO
    com.banking.rag: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
