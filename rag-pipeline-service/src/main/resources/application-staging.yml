spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?autoReconnect=true&useSSL=true&characterEncoding=utf8
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
  
  jpa:
    show-sql: false
  
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  
  ai:
    vectorstore:
      chroma:
        client:
          host: ${CHROMA_HOST}
          port: ${CHROMA_PORT}

server:
  port: 8093
  tomcat:
    threads:
      max: 150
      min-spare: 10

management:
  tracing:
    sampling:
      probability: 0.5

logging:
  level:
    root: INFO
    com.banking.rag: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

springdoc:
  swagger-ui:
    enabled: true

rag:
  retrieval:
    top-k: 10
    similarity-threshold: 0.75
  reranking:
    enabled: true
    top-n: 5
  context:
    max-tokens: 4000
  cache:
    enabled: true
    ttl-seconds: 3600
    similarity-threshold: 0.95

security:
  allowed-origins: ${ALLOWED_ORIGINS}
  rate-limit:
    enabled: true
    requests-per-minute: 100
