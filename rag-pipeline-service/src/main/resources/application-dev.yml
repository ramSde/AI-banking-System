spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/rag_pipeline_db?autoReconnect=true&useSSL=false&characterEncoding=utf8
    username: admin
    password: admin
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  data:
    redis:
      host: localhost
      port: 6379
      password:
  
  kafka:
    bootstrap-servers: localhost:9092
  
  ai:
    vectorstore:
      chroma:
        client:
          host: localhost
          port: 8000

server:
  port: 8093
  tomcat:
    threads:
      max: 50
      min-spare: 5

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    root: INFO
    com.banking.rag: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

springdoc:
  swagger-ui:
    enabled: true

rag:
  retrieval:
    top-k: 10
    similarity-threshold: 0.7
  reranking:
    enabled: true
    top-n: 5
  context:
    max-tokens: 4000
  cache:
    enabled: true
    ttl-seconds: 3600
    similarity-threshold: 0.95

security:
  allowed-origins: http://localhost:3000,http://localhost:3001
  rate-limit:
    enabled: false
