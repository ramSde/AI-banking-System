server:
  port: 8013

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/rag_pipeline_db?autoReconnect=true&useSSL=false&characterEncoding=utf8
    username: admin
    password: admin
  
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  data:
    redis:
      host: localhost
      port: 6379
      password:
  
  kafka:
    bootstrap-servers: localhost:9092

spring.ai:
  openai:
    api-key: ${OPENAI_API_KEY:sk-test-key}
  
  vectorstore:
    chroma:
      client:
        host: localhost
        port: 8000

rag:
  retrieval:
    top-k: 10
    similarity-threshold: 0.7
  
  reranking:
    enabled: true
    top-n: 5
  
  context:
    max-tokens: 4000
  
  cache:
    enabled: true
    ttl-seconds: 3600
    similarity-threshold: 0.95

management:
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    root: INFO
    com.banking.rag: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
