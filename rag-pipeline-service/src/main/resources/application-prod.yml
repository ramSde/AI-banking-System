server:
  port: 8013

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?autoReconnect=true&useSSL=true&sslmode=require&characterEncoding=utf8
    hikari:
      maximum-pool-size: 50
      minimum-idle: 15
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl: true
      timeout: 5000
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: PLAIN
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG}
      ssl.endpoint.identification.algorithm: https

spring.ai:
  openai:
    api-key: ${OPENAI_API_KEY}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
  
  vectorstore:
    chroma:
      client:
        host: ${CHROMADB_HOST}
        port: ${CHROMADB_PORT}

rag:
  retrieval:
    top-k: 10
    similarity-threshold: 0.8
  
  reranking:
    enabled: true
    top-n: 5
  
  context:
    max-tokens: 4000
  
  cache:
    enabled: true
    ttl-seconds: 7200
    similarity-threshold: 0.95

resilience4j:
  circuitbreaker:
    instances:
      chromadb:
        failure-rate-threshold: 30
        slow-call-duration-threshold: 3s
      openai:
        failure-rate-threshold: 30
        slow-call-duration-threshold: 8s

management:
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 0.1

logging:
  level:
    root: WARN
    com.banking.rag: INFO
    org.springframework.web: ERROR
    org.springframework.security: ERROR
    org.hibernate.SQL: ERROR
