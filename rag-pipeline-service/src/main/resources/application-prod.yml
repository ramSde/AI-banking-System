spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?autoReconnect=true&useSSL=true&sslmode=require&characterEncoding=utf8
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      leak-detection-threshold: 60000
  
  jpa:
    show-sql: false
    properties:
      hibernate:
        generate_statistics: false
  
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl: true
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: SSL
      ssl.truststore.location: ${KAFKA_TRUSTSTORE_LOCATION}
      ssl.truststore.password: ${KAFKA_TRUSTSTORE_PASSWORD}
  
  ai:
    vectorstore:
      chroma:
        client:
          host: ${CHROMA_HOST}
          port: ${CHROMA_PORT}

server:
  port: 8093
  tomcat:
    threads:
      max: 200
      min-spare: 10
  shutdown: graceful

management:
  tracing:
    sampling:
      probability: 0.1

logging:
  level:
    root: WARN
    com.banking.rag: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

springdoc:
  swagger-ui:
    enabled: false

rag:
  retrieval:
    top-k: 10
    similarity-threshold: 0.8
  reranking:
    enabled: true
    top-n: 5
  context:
    max-tokens: 4000
  cache:
    enabled: true
    ttl-seconds: 7200
    similarity-threshold: 0.95
    max-entries: 50000

security:
  allowed-origins: ${ALLOWED_ORIGINS}
  rate-limit:
    enabled: true
    requests-per-minute: 60
