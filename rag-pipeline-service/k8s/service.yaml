apiVersion: v1
kind: Service
metadata:
  name: rag-pipeline-service
  namespace: banking-platform
  labels:
    app: rag-pipeline-service
    component: ai-infrastructure
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8093"
    prometheus.io/path: "/api/actuator/prometheus"
spec:
  type: ClusterIP
  selector:
    app: rag-pipeline-service
  ports:
    - name: http
      port: 8093
      targetPort: 8093
      protocol: TCP
  sessionAffinity: None
