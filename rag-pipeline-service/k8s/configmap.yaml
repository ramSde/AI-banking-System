apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-pipeline-config
data:
  # Database Configuration
  db.host: "postgres-service"
  db.port: "5432"
  db.name: "rag_pipeline_db"
  
  # Redis Configuration
  redis.host: "redis-service"
  redis.port: "6379"
  
  # Kafka Configuration
  kafka.bootstrap.servers: "kafka-service:9092"
  
  # ChromaDB Configuration
  chromadb.host: "chromadb-service"
  chromadb.port: "8000"
  
  # RAG Configuration
  rag.top.k: "10"
  rag.similarity.threshold: "0.7"
  rag.reranking.enabled: "true"
  rag.reranking.top.n: "5"
  rag.max.context.tokens: "4000"
  rag.cache.enabled: "true"
  rag.cache.ttl: "3600"
  rag.cache.similarity.threshold: "0.95"
  
  # Logging Configuration
  log.level.root: "INFO"
  log.level.app: "INFO"
