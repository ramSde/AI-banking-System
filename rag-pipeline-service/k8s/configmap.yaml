apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-pipeline-service-config
  namespace: banking-platform
  labels:
    app: rag-pipeline-service
    component: ai-infrastructure
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8093"
  ENVIRONMENT: "production"
  
  # Database
  DB_HOST: "postgresql-service"
  DB_PORT: "5432"
  DB_NAME: "rag_pipeline_db"
  DB_POOL_MAX_SIZE: "20"
  DB_POOL_MIN_IDLE: "5"
  DB_CONNECTION_TIMEOUT: "30000"
  DB_IDLE_TIMEOUT: "600000"
  DB_MAX_LIFETIME: "1800000"
  DB_SSL: "true"
  
  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_TIMEOUT: "2000"
  REDIS_POOL_MAX_ACTIVE: "8"
  REDIS_POOL_MAX_IDLE: "8"
  REDIS_POOL_MIN_IDLE: "2"
  REDIS_POOL_MAX_WAIT: "2000"
  
  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  
  # ChromaDB
  CHROMA_HOST: "chromadb-service"
  CHROMA_PORT: "8000"
  CHROMA_COLLECTION: "banking_documents"
  
  # OpenAI
  OPENAI_MODEL: "gpt-4"
  OPENAI_TEMPERATURE: "0.7"
  OPENAI_EMBEDDING_MODEL: "text-embedding-ada-002"
  
  # RAG Configuration
  RAG_TOP_K: "10"
  RAG_SIMILARITY_THRESHOLD: "0.8"
  RAG_MAX_RESULTS: "20"
  RAG_RERANK_ENABLED: "true"
  RAG_RERANK_MODEL: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  RAG_RERANK_TOP_N: "5"
  RAG_MAX_CONTEXT_TOKENS: "4000"
  RAG_CHUNK_OVERLAP: "200"
  RAG_CACHE_ENABLED: "true"
  RAG_CACHE_TTL: "7200"
  RAG_CACHE_SIMILARITY_THRESHOLD: "0.95"
  RAG_CACHE_MAX_ENTRIES: "50000"
  
  # Tomcat
  TOMCAT_THREADS_MAX: "200"
  TOMCAT_THREADS_MIN_SPARE: "10"
  TOMCAT_ACCEPT_COUNT: "100"
  TOMCAT_CONNECTION_TIMEOUT: "20000"
  
  # Logging
  LOG_LEVEL_ROOT: "WARN"
  LOG_LEVEL_APP: "INFO"
  LOG_LEVEL_SPRING_WEB: "WARN"
  LOG_LEVEL_SPRING_SECURITY: "WARN"
  LOG_LEVEL_HIBERNATE_SQL: "WARN"
  LOG_LEVEL_HIBERNATE_BINDER: "WARN"
  
  # Monitoring
  TRACING_PROBABILITY: "0.1"
  SWAGGER_ENABLED: "false"
  
  # Security
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "60"
