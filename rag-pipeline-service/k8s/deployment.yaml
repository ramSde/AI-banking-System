apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-pipeline-service
  labels:
    app: rag-pipeline-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-pipeline-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rag-pipeline-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8013"
        prometheus.io/path: "/api/actuator/prometheus"
    spec:
      serviceAccountName: rag-pipeline-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -v -w30 postgres-service 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 5
              done
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -v -w30 kafka-service 9092; do
                echo "Waiting for Kafka..."
                sleep 5
              done
      containers:
        - name: rag-pipeline-service
          image: your-registry/rag-pipeline-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8013
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: rag-pipeline-config
                  key: db.host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: rag-pipeline-config
                  key: db.port
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: rag-pipeline-config
                  key: db.name
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rag-pipeline-secrets
                  key: db.username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rag-pipeline-secrets
                  key: db.password
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: rag-pipeline-config
                  key: redis.host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: rag-pipeline-config
                  key: redis.port
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rag-pipeline-secrets
                  key: redis.password
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: rag-pipeline-config
                  key: kafka.bootstrap.servers
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-pipeline-secrets
                  key: openai.api.key
            - name: CHROMADB_HOST
              valueFrom:
                configMapKeyRef:
                  name: rag-pipeline-config
                  key: chromadb.host
            - name: CHROMADB_PORT
              valueFrom:
                configMapKeyRef:
                  name: rag-pipeline-config
                  key: chromadb.port
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rag-pipeline-secrets
                  key: jwt.secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8013
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8013
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
