apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-pipeline-service
  namespace: banking-platform
  labels:
    app: rag-pipeline-service
    component: ai-infrastructure
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rag-pipeline-service
  template:
    metadata:
      labels:
        app: rag-pipeline-service
        component: ai-infrastructure
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8093"
        prometheus.io/path: "/api/actuator/prometheus"
    spec:
      serviceAccountName: rag-pipeline-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgresql-service 5432; do echo waiting for postgresql; sleep 2; done;']
        
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka-service 9092; do echo waiting for kafka; sleep 2; done;']
        
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done;']
        
        - name: wait-for-chromadb
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z chromadb-service 8000; do echo waiting for chromadb; sleep 2; done;']
      
      containers:
        - name: rag-pipeline-service
          image: banking-platform/rag-pipeline-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8093
              protocol: TCP
          
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: rag-pipeline-service-config
                  key: SPRING_PROFILES_ACTIVE
            
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rag-pipeline-service-secret
                  key: DB_USERNAME
            
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rag-pipeline-service-secret
                  key: DB_PASSWORD
            
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rag-pipeline-service-secret
                  key: REDIS_PASSWORD
            
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rag-pipeline-service-secret
                  key: JWT_SECRET
            
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-pipeline-service-secret
                  key: OPENAI_API_KEY
            
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: rag-pipeline-service-secret
                  key: ALLOWED_ORIGINS
          
          envFrom:
            - configMapRef:
                name: rag-pipeline-service-config
          
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8093
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8093
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      
      volumes:
        - name: logs
          emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - rag-pipeline-service
                topologyKey: kubernetes.io/hostname
