spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/banking_fraud?autoReconnect=true&useSSL=false&characterEncoding=utf8
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8088

logging:
  level:
    root: INFO
    com.banking.fraud: DEBUG
    org.springframework.kafka: DEBUG
    org.hibernate.SQL: DEBUG

fraud:
  scoring:
    high-risk-threshold: 70
    medium-risk-threshold: 30
    auto-block-threshold: 85
