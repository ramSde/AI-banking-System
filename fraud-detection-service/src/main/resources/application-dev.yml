spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/banking_fraud?autoReconnect=true&useSSL=false&characterEncoding=utf8
    username: admin
    password: admin
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  data:
    redis:
      host: localhost
      port: 6379
      password:
  
  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8088

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.banking.fraud: DEBUG
    org.springframework.kafka: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

fraud:
  scoring:
    high-risk-threshold: 70
    medium-risk-threshold: 30
    auto-block-threshold: 85
  velocity:
    transaction-count-window-minutes: 60
    max-transactions-per-window: 10
  amount:
    large-transaction-threshold: 10000.00
    suspicious-amount-threshold: 50000.00
