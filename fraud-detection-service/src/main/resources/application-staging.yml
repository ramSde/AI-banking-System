spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres-staging}:5432/banking_fraud?autoReconnect=true&useSSL=true&characterEncoding=utf8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
  
  jpa:
    show-sql: false
  
  data:
    redis:
      host: ${REDIS_HOST:redis-staging}
      port: 6379
      password: ${REDIS_PASSWORD}
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka-staging:9092}

server:
  port: 8088

management:
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.banking.fraud: INFO
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN

fraud:
  scoring:
    high-risk-threshold: 70
    medium-risk-threshold: 30
    auto-block-threshold: 85
  velocity:
    transaction-count-window-minutes: 60
    max-transactions-per-window: 10
  amount:
    large-transaction-threshold: 10000.00
    suspicious-amount-threshold: 50000.00
