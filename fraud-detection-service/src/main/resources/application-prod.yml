spring:
  datasource:
    url: jdbc:postgresql://postgres-prod:5432/banking_fraud?autoReconnect=true&useSSL=true&characterEncoding=utf8&sslmode=require
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: redis-prod
      port: 6379
      ssl: true

  kafka:
    bootstrap-servers: kafka-prod:9092
    properties:
      security.protocol: SSL

server:
  port: 8088

logging:
  level:
    root: WARN
    com.banking.fraud: INFO
