apiVersion: apps/v1
kind: Deployment
metadata:
  name: i18n-service
  namespace: banking
  labels:
    app: i18n-service
    tier: backend
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: i18n-service
  template:
    metadata:
      labels:
        app: i18n-service
        tier: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8017"
        prometheus.io/path: "/api/actuator/prometheus"
    spec:
      serviceAccountName: i18n-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for postgres; sleep 2; done;']
        
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done;']
      
      containers:
        - name: i18n-service
          image: your-registry/i18n-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8017
              protocol: TCP
          
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: i18n-service-config
                  key: SPRING_PROFILES_ACTIVE
            
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: i18n-service-config
                  key: DB_HOST
            
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: i18n-service-config
                  key: DB_PORT
            
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: i18n-service-config
                  key: DB_NAME
            
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: i18n-service-config
                  key: REDIS_HOST
            
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: i18n-service-config
                  key: REDIS_PORT
            
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            
            - name: I18N_TRANSLATION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: i18n-service-secret
                  key: translation-api-key
                  optional: true
          
          envFrom:
            - configMapRef:
                name: i18n-service-config
          
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8017
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8017
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      
      volumes:
        - name: logs
          emptyDir: {}
      
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
