spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/i18n_db
    username: admin
    password: admin
  
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  data:
    redis:
      host: localhost
      port: 6379
  
  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8087

logging:
  level:
    root: INFO
    com.banking.i18n: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

i18n:
  translation-api:
    enabled: false
  auto-translate-missing: false
