# ══════════════════════════════════════════════════════════════════════
# Identity Service — application-staging.yml
# Staging environment configuration
# ══════════════════════════════════════════════════════════════════════

spring:
  profiles:
    active: staging

  # ── DATABASE (Staging PostgreSQL) ───────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?autoReconnect=true&useSSL=true&sslmode=require&characterEncoding=utf8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  # ── JPA (Minimal logging) ───────────────────────────────────────────
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

  # ── REDIS (Staging) ─────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true
      lettuce:
        pool:
          max-active: 30
          max-idle: 15
          min-idle: 5

  # ── KAFKA (Staging) ─────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG}

# ── SERVER ────────────────────────────────────────────────────────────
server:
  port: 8080
  tomcat:
    threads:
      max: 300
      min-spare: 20

management:
  server:
    port: 8081
  endpoint:
    health:
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

# ── JWT (Staging keys from secrets) ───────────────────────────────────
banking:
  identity:
    jwt:
      private-key: ${JWT_PRIVATE_KEY}
      public-key: ${JWT_PUBLIC_KEY}
      issuer: banking-platform-staging
      audience: banking-api-staging
      access-token-ttl-minutes: 15
      refresh-token-ttl-days: 7
    
    password:
      bcrypt-strength: 12
      min-length: 8
    
    security:
      max-login-attempts: 5
      lockout-duration-minutes: 30

# ── LOGGING (Structured JSON) ─────────────────────────────────────────
logging:
  level:
    root: INFO
    com.banking.identity: INFO
    org.springframework.security: INFO
    org.springframework.kafka: WARN
    org.hibernate: WARN

# ── TRACING (Reduced sampling) ────────────────────────────────────────
management:
  tracing:
    sampling:
      probability: 0.5
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
